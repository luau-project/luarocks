name: Windows test

on:
  push:
    branches: master
  pull_request:
    branches: '*'
  workflow_dispatch:
    branches: '*'

env:
  LUAROCKS_VER: 3.0.0
  LUAROCKS_DEPS_DIR: c:\external
  LUAROCKS_DEPS_OPENSSL_VER: "1.1.1"
  LUAROCKS_DEPS_ZLIB_VER: "1.3.1"
  LUAROCKS_DEPS_BZIP2_VER: "1.0.8"
  LUAROCKS_WINDOWS_GH_CI: "ci-windows"

jobs:
  ##############################################################################
  build:
    runs-on: "windows-latest"
    defaults:
      run:
        shell: cmd
    strategy:
      matrix:
        include:
          # quick tests
          - LUAV: "2.1"
            LUAT: "luajit"
            COMPILER: "vs"
            FILES: ""
            EXCLUDE: "integration,unit"
            TESTTYPE: ""
          # Lua 5.4 tests
          - LUAV: "5.4"
            LUAT: "lua"
            COMPILER: "vs"
            FILES: ""
            EXCLUDE: "integration,quick"
            TESTTYPE: "unit"
          - LUAV: "5.4"
            LUAT: "lua"
            COMPILER: "vs"
            FILES: ""
            EXCLUDE: "unit,quick"
            TESTTYPE: ""
          - LUAV: "5.4"
            LUAT: "lua"
            COMPILER: "mingw"
            FILES: "spec//build_spec.lua"
            EXCLUDE: ""
            TESTTYPE: ""
          # LuaJIT 2.1 tests
          - LUAV: "2.1"
            LUAT: "luajit"
            COMPILER: "vs"
            FILES: ""
            EXCLUDE: "integration,quick"
            TESTTYPE: "unit"
          - LUAV: "2.1"
            LUAT: "luajit"
            COMPILER: "vs"
            FILES: ""
            EXCLUDE: "unit,quick"
            TESTTYPE: ""
          - LUAV: "2.1"
            LUAT: "luajit"
            COMPILER: "mingw"
            FILES: "spec//build_spec.lua"
            EXCLUDE: ""
            TESTTYPE: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC dev prompt
        if: ${{ matrix.COMPILER == 'vs' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.0
          arch: x86
      
      - name: Cache zlib tarball
        id: cache-zlib-tarball
        uses: actions/cache@v4
        with:
          path: zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}.tar.gz
          key: zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}

      - name: Add bin directory of dependencies to system PATH environment variable
        run: echo "${{ env.LUAROCKS_DEPS_DIR }}\bin">>${{ github.path }}
          
      - name: Install dependency (zlib)
        run: |
          cd "${{ runner.temp }}" && mkdir zlib && cd zlib;

          IF NOT "${{ steps.cache-zlib-tarball.outputs.cache-hit }}"=="true" (
            curl "-o" "${{ github.workspace }}\zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}.tar.gz" ^
              "https://zlib.net/zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}.tar.gz"
          )
          
          tar -xf "${{ github.workspace }}\zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}.tar.gz"
          
          IF "${{ matrix.COMPILER }}"=="vs" (
            SET CMAKE_GENERATOR=NMake Makefiles
            SET CC=cl
          ) ELSE (
            SET CMAKE_GENERATOR=MinGW Makefiles
            SET CC=gcc
          )
          
          cmake "-G" "%CMAKE_GENERATOR%" ^
            "-DCMAKE_C_COMPILER=%CC%" ^
            "-DCMAKE_BUILD_TYPE=Release" ^
            "-DBUILD_SHARED_LIBS=ON" ^
            "-DBUILD_STATIC_LIBS=OFF" ^
            "--install-prefix" "${{ env.LUAROCKS_DEPS_DIR }}" ^
            "-S" "zlib-${{ env.LUAROCKS_DEPS_ZLIB_VER }}" ^
            "-B" "_build" && ^
          cmake "--build" "_build" "--config" "Release" && ^
          cmake "--install" "_build" "--config" "Release"

          IF "${{ matrix.COMPILER }}"=="vs" (
            copy "${{ env.LUAROCKS_DEPS_DIR }}\lib\zlib.lib" ^
              "${{ env.LUAROCKS_DEPS_DIR }}\lib\z.lib"
            
            copy "${{ env.LUAROCKS_DEPS_DIR }}\bin\zlib1.dll" ^
              "${{ env.LUAROCKS_DEPS_DIR }}\lib\z.dll"
          )

      - name: Cache libbz2 tarball
        id: cache-libbz2-tarball
        uses: actions/cache@v4
        with:
          path: bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}.tar.gz
          key: bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}
        
      - name: Install dependency (libbz2)
        run: |
          cd "${{ runner.temp }}" && mkdir bzip2 && cd bzip2

          IF NOT "${{ steps.cache-libbz2-tarball.outputs.cache-hit }}"=="true" (
            curl "-o" "${{ github.workspace }}\bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}.tar.gz" ^
              "https://sourceware.org/pub/bzip2/bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}.tar.gz"
          )
          
          tar -xf "${{ github.workspace }}\bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}.tar.gz" && ^
          cd "bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}"
          
          IF EXIST CMakeLists.txt ( del CMakeLists.txt )

          echo cmake_minimum_required(VERSION 3.15)>>CMakeLists.txt
          echo project(bzip2>>CMakeLists.txt
          echo     VERSION ${{ env.LUAROCKS_DEPS_BZIP2_VER }}>>CMakeLists.txt
          echo     LANGUAGES C)>>CMakeLists.txt
          echo set(CMAKE_BUILD_TYPE "Release">>CMakeLists.txt
          echo     CACHE STRING "Build type")>>CMakeLists.txt
          echo set(bzip2_lib_header>>CMakeLists.txt
          echo     bzlib.h)>>CMakeLists.txt
          echo set(bzip2_lib_sources>>CMakeLists.txt
          echo     blocksort.c>>CMakeLists.txt
          echo     huffman.c>>CMakeLists.txt
          echo     crctable.c>>CMakeLists.txt
          echo     randtable.c>>CMakeLists.txt
          echo     compress.c>>CMakeLists.txt
          echo     decompress.c>>CMakeLists.txt
          echo     bzlib.c)>>CMakeLists.txt
          echo set(bzip2_lib_definitions "_FILE_OFFSET_BITS=64")>>CMakeLists.txt
          echo if (WIN32)>>CMakeLists.txt
          echo     list(APPEND bzip2_lib_definitions "WIN32")>>CMakeLists.txt
          echo endif()>>CMakeLists.txt
          echo set(bzip2_targets_to_install "")>>CMakeLists.txt
          echo option(BUILD_SHARED_LIBS "Build SHARED library" ON)>>CMakeLists.txt
          echo option(BUILD_STATIC_LIBS "Build STATIC library" OFF)>>CMakeLists.txt
          echo if (NOT (BUILD_SHARED_LIBS OR BUILD_STATIC_LIBS))>>CMakeLists.txt
          echo     message(FATAL_ERROR "At least a shared or static library must be built.")>>CMakeLists.txt
          echo endif()>>CMakeLists.txt
          echo include(GNUInstallDirs)>>CMakeLists.txt
          echo if (BUILD_SHARED_LIBS)>>CMakeLists.txt
          echo     add_library(bzip2_SHARED SHARED)>>CMakeLists.txt
          echo     target_compile_definitions(bzip2_SHARED PRIVATE ${bzip2_lib_definitions})>>CMakeLists.txt
          echo     target_sources(bzip2_SHARED PRIVATE ${bzip2_lib_sources})>>CMakeLists.txt
          echo     if (WIN32)>>CMakeLists.txt
          echo         if (MSVC OR "${CMAKE_C_SIMULATE_ID}" STREQUAL "MSVC")>>CMakeLists.txt
          echo             set(bz2_msvc_def "${CMAKE_CURRENT_BINARY_DIR}/bz2.def")>>CMakeLists.txt
          echo             file(READ "libbz2.def" __libbz2_def_content)>>CMakeLists.txt
          echo             string(REPLACE "LIBBZ2" "bz2" __bz2_replaced>>CMakeLists.txt
          echo                 "${__libbz2_def_content}")>>CMakeLists.txt
          echo             file(WRITE ${bz2_msvc_def} "${__bz2_replaced}")>>CMakeLists.txt
          echo             target_sources(bzip2_SHARED PRIVATE ${bz2_msvc_def})>>CMakeLists.txt
          echo         else()>>CMakeLists.txt
          echo             target_sources(bzip2_SHARED PRIVATE "libbz2.def")>>CMakeLists.txt
          echo         endif()>>CMakeLists.txt
          echo     endif()>>CMakeLists.txt
          echo     set_target_properties(bzip2_SHARED>>CMakeLists.txt
          echo         PROPERTIES>>CMakeLists.txt
          echo         POSITION_INDEPENDENT_CODE ON>>CMakeLists.txt
          echo         OUTPUT_NAME "bz2")>>CMakeLists.txt
          echo     list(APPEND bzip2_targets_to_install "bzip2_SHARED")>>CMakeLists.txt
          echo endif()>>CMakeLists.txt
          echo if (BUILD_STATIC_LIBS)>>CMakeLists.txt
          echo     add_library(bzip2_STATIC STATIC)>>CMakeLists.txt
          echo     target_compile_definitions(bzip2_STATIC PRIVATE ${bzip2_lib_definitions})>>CMakeLists.txt
          echo     target_sources(bzip2_STATIC PRIVATE ${bzip2_lib_sources})>>CMakeLists.txt
          echo     set_target_properties(bzip2_STATIC>>CMakeLists.txt
          echo         PROPERTIES>>CMakeLists.txt
          echo         OUTPUT_NAME "bz2-static")>>CMakeLists.txt
          echo     list(APPEND bzip2_targets_to_install "bzip2_STATIC")>>CMakeLists.txt
          echo endif()>>CMakeLists.txt
          echo install(FILES ${bzip2_lib_header}>>CMakeLists.txt
          echo     DESTINATION "${CMAKE_INSTALL_INCLUDEDIR}")>>CMakeLists.txt
          echo install(TARGETS ${bzip2_targets_to_install}>>CMakeLists.txt
          echo     RUNTIME DESTINATION "${CMAKE_INSTALL_BINDIR}">>CMakeLists.txt
          echo     LIBRARY DESTINATION "${CMAKE_INSTALL_LIBDIR}">>CMakeLists.txt
          echo     ARCHIVE DESTINATION "${CMAKE_INSTALL_LIBDIR}")>>CMakeLists.txt

          cd ..
          
          IF "${{ matrix.COMPILER }}"=="vs" (
            SET CMAKE_GENERATOR=NMake Makefiles
            SET CC=cl
          ) ELSE (
            SET CMAKE_GENERATOR=MinGW Makefiles
            SET CC=gcc
          )
          
          cmake "-G" "%CMAKE_GENERATOR%" ^
            "-DCMAKE_C_COMPILER=%CC%" ^
            "-DCMAKE_BUILD_TYPE=Release" ^
            "-DBUILD_SHARED_LIBS=ON" ^
            "-DBUILD_STATIC_LIBS=OFF" ^
            "--install-prefix" "${{ env.LUAROCKS_DEPS_DIR }}" ^
            "-S" "bzip2-${{ env.LUAROCKS_DEPS_BZIP2_VER }}" ^
            "-B" "_build" && ^
          cmake "--build" "_build" "--config" "Release" && ^
          cmake "--install" "_build" "--config" "Release"
      
      - name: Cache OpenSSL installer
        id: cache-openssl-installer
        uses: actions/cache@v4
        with:
          path: build\openssl-installer-${{ env.LUAROCKS_DEPS_OPENSSL_VER }}.exe
          key: openssl-${{ env.LUAROCKS_DEPS_OPENSSL_VER }}
      
      - name: Instal dependency (OpenSSL)
        shell: pwsh
        # On Windows, building OpenSSL from source code is quite slow (20m ~ 30m).
        # In order to get pre-built binaries (CI purposes) for the OpenSSL library
        # ABI-compatible with MSVC and GCC, a faster approach can be achieved
        # by downloading the binaries from a known third-party.

        # slproweb ( https://slproweb.com/products/Win32OpenSSL.html ) is a long
        # time third-party providing pre-built OpenSSL binaries through
        # Windows installers.

        # Below, we follow the idea contained at
        # https://github.com/actions/runner-images/blob/a88fc4db06ae2350cb3128627b7fe4b5ee847f8e/images/windows/scripts/build/Install-OpenSSL.ps1
        # to install OpenSSL from slproweb.

        # Note 1: AppVeyor pre-built binaries for OpenSSL
        #         come from this provider.

        # Note 2: Only 32 bits binaries ($bits = '32' below)
        #         ships with MinGW import libraries
        run: |
          $installerName = "${{ github.workspace }}\build\openssl-installer-${{ env.LUAROCKS_DEPS_OPENSSL_VER }}.exe";

          if ("${{ steps.cache-openssl-installer.outputs.cache-hit }}" -ne "true")
          {
            $arch = 'INTEL';
            $bits = '32';
            $light = $false;
            $version = "${{ env.LUAROCKS_DEPS_OPENSSL_VER }}";

            # Fetch available installers list
            $jsonUrl = 'https://raw.githubusercontent.com/slproweb/opensslhashes/master/win32_openssl_hashes.json';

            $installersAvailable = (Invoke-RestMethod $jsonUrl).files;
            $installerNames = $installersAvailable | Get-Member -MemberType NoteProperty | Select-Object -ExpandProperty Name;

            $installerUrl = $null;
            $installerHash = $null;

            foreach ($key in $installerNames) {
              $installer = $installersAvailable.$key;
              if (($installer.light -eq $light) -and ($installer.arch -eq $arch) -and ($installer.bits -eq $bits) -and ($installer.installer -eq "exe") -and ($installer.basever -eq $version)) {
                $installerUrl = $installer.url;
                $installerHash = $installer.sha512.Replace("-", "").ToLower();
                break;
              }
            }

            if ($installerUrl -eq $null) {
              throw "Installer not found for version $version";
            }

            # Download the installer
            curl "--create-dirs" "-o" "${installerName}" "${installerUrl}";

            # Validate sha512 checksum
            $downloadedHash = Get-FileHash -Path "${installerName}" -Algorithm "SHA512" |
              Select-Object -ExpandProperty Hash;
            
            $downloadedHash = $downloadedHash.Replace("-", "").ToLower();

            if ("${downloadedHash}" -ne "${installerHash}")
            {
              throw "Installer SHA512 hash mismatch: (Expected ${installerHash}), (Got ${downloadedHash})";
            }
          }
          
          Start-Process `
            -FilePath "${installerName}" `
            -ArgumentList "/verysilent", "/sp-", "/suppressmsgboxes", "/DIR=`"${{ env.LUAROCKS_DEPS_DIR }}`"" `
            -Wait;

          # Copy all the MinGW import libraries (*.a)
          # from "${{ env.LUAROCKS_DEPS_DIR }}\lib\MinGW" to "${{ env.LUAROCKS_DEPS_DIR }}\lib"
          $deps_lib_dir = Join-Path -Path "${{ env.LUAROCKS_DEPS_DIR }}" -ChildPath "lib";
          $mingw_implib_dir = Join-Path -Path "${deps_lib_dir}" -ChildPath "MinGW";
          
          if (Test-Path -Path $mingw_implib_dir)
          {
            Get-ChildItem -Path $mingw_implib_dir -Recurse -File |
              Where-Object Extension -EQ ".a" |
              ForEach-Object {
                Copy-Item -Path ($_.FullName) -Destination $deps_lib_dir;
              }
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # employ the latest Python version
          # described at https://pypi.org/project/hererocks/
          python-version: '3.11'
      
      - name: Install SSL certificate
        run: |
          pip install --upgrade certifi
          FOR /F "tokens=* USEBACKQ" %%F IN (`python -c "import certifi;print(certifi.where())"`) DO (
            echo SSL_CERT_FILE=%%F>>${{ github.env }}
          )

      - name: Install ${{ matrix.LUAT }} ${{ matrix.LUAV }}
        run: |
          SET "CURRENT_LUA_DIR=${{ github.workspace }}\lua_install-${{ matrix.LUAV }}"
          
          pip install hererocks

          hererocks ^
            "%CURRENT_LUA_DIR%" ^
            "--${{ matrix.LUAT }}" ^
            "${{ matrix.LUAV }}" ^
            "--luarocks" "latest" ^
            "--target=${{ matrix.COMPILER }}"
          
          SET "CURRENT_LUA_BIN=%CURRENT_LUA_DIR%\bin"

          echo %CURRENT_LUA_BIN%>>${{ github.path }}
          echo CURRENT_LUA_DIR=%CURRENT_LUA_DIR%>>${{ github.env }}
          echo CURRENT_LUA_BIN=%CURRENT_LUA_BIN%>>${{ github.env }}
          echo BUSTED_BAT=%CURRENT_LUA_BIN%\busted.bat>>${{ github.env }}
          echo LUACOV_BAT=%CURRENT_LUA_BIN%\luacov.bat>>${{ github.env }}
      
      - name: Install compat53
        run: luarocks install compat53
        
      - name: Install busted
        run: IF NOT EXIST "${{ env.BUSTED_BAT }}" luarocks install busted
      
      - name: Install cluacov
        run: IF NOT EXIST "${{ env.LUACOV_BAT }}" luarocks install cluacov
        
      - name: Install busted-htest
        run: luarocks install busted-htest
      
      - name: Run test
        run: |
          IF "x${{ matrix.FILES }}"=="x" (
            busted ^
              "-o" "htest" ^
              "-v" "--lpath=.//?.lua" ^
              "--exclude-tags=ssh,unix,${{ matrix.EXCLUDE }}" ^
              "-Xhelper" ^
              "lua_dir=${{ env.CURRENT_LUA_DIR }},${{ env.LUAROCKS_WINDOWS_GH_CI }},${{ matrix.COMPILER }}"
          ) ELSE (
            busted ^
              "-o" "htest" ^
              "-v" "--lpath=.//?.lua" ^
              "--exclude-tags=ssh,unix,${{ matrix.EXCLUDE }}" ^
              "-Xhelper" ^
              "lua_dir=${{ env.CURRENT_LUA_DIR }},${{ env.LUAROCKS_WINDOWS_GH_CI }},${{ matrix.COMPILER }}" ^
              "${{ matrix.FILES }}"
          )
      
      - name: Run unit test
        if: ${{ matrix.TESTTYPE == 'unit' }}
        run: |
          IF "x${{ matrix.FILES }}"=="x" (
            busted ^
              "-o" "htest" ^
              "-v" "--lpath=.//?.lua" ^
              "--exclude-tags=ssh,unix,${{ matrix.EXCLUDE }}" ^
              "-Xhelper" ^
              "lua_dir=${{ env.CURRENT_LUA_DIR }},${{ env.LUAROCKS_WINDOWS_GH_CI }},${{ matrix.COMPILER }},env=full"
          ) ELSE (
            busted ^
              "-o" "htest" ^
              "-v" "--lpath=.//?.lua" ^
              "--exclude-tags=ssh,unix,${{ matrix.EXCLUDE }}" ^
              "-Xhelper" ^
              "lua_dir=${{ env.CURRENT_LUA_DIR }},${{ env.LUAROCKS_WINDOWS_GH_CI }},${{ matrix.COMPILER }},env=full" ^
              "${{ matrix.FILES }}"
          )
